name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.9.3"
  LLVM_VERSION: "22"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: [self-hosted, "${{ matrix.label }}"]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            label: linux
          - os: macOS
            label: macos
          - os: Windows
            label: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ===== Linux (Ubuntu 24.04) =====
      - name: Install toolchain (Linux)
        if: matrix.os == 'Linux'
        run: |
          # Clang 19 from LLVM apt repo
          if ! clang-${LLVM_VERSION} --version >/dev/null 2>&1; then
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
            echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${LLVM_VERSION} main" | \
              sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update
            sudo apt-get install -y clang-${LLVM_VERSION} libc++-${LLVM_VERSION}-dev libc++abi-${LLVM_VERSION}-dev
          fi

      - name: Install dependencies (Linux)
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libluajit-5.1-dev libpcre3-dev libsqlite3-dev \
            libssl-dev zlib1g-dev \
            libpulse-dev libasound2-dev libpipewire-0.3-dev
          pip3 install --break-system-packages aqtinstall 2>/dev/null || pip3 install aqtinstall

      - name: Install Qt (Linux)
        if: matrix.os == 'Linux'
        run: |
          if [ ! -d "$HOME/Qt/${QT_VERSION}" ]; then
            aqt install-qt linux desktop ${QT_VERSION} linux_gcc_64 -m qtmultimedia --outputdir $HOME/Qt
          fi
          echo "Qt6_DIR=$HOME/Qt/${QT_VERSION}/gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "$HOME/Qt/${QT_VERSION}/gcc_64/bin" >> $GITHUB_PATH

      - name: Configure (Linux)
        if: matrix.os == 'Linux'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-${LLVM_VERSION} \
            -DCMAKE_CXX_COMPILER=clang++-${LLVM_VERSION} \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++"

      # ===== macOS 15 =====
      - name: Install toolchain (macOS)
        if: matrix.os == 'macOS'
        run: |
          # Install LLVM (Clang 19+) from Homebrew — Apple Clang doesn't support C++26
          if ! brew list llvm >/dev/null 2>&1; then
            brew install llvm
          fi
          brew install cmake ninja pcre luajit sqlite openssl
          pip3 install --break-system-packages aqtinstall 2>/dev/null || pip3 install aqtinstall

      - name: Install Qt (macOS)
        if: matrix.os == 'macOS'
        run: |
          if [ ! -d "$HOME/Qt/${QT_VERSION}" ]; then
            aqt install-qt mac desktop ${QT_VERSION} -m qtmultimedia --outputdir $HOME/Qt
          fi
          echo "Qt6_DIR=$HOME/Qt/${QT_VERSION}/macos/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "$HOME/Qt/${QT_VERSION}/macos/bin" >> $GITHUB_PATH

      - name: Configure (macOS)
        if: matrix.os == 'macOS'
        run: |
          LLVM_PREFIX=$(brew --prefix llvm)
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${LLVM_PREFIX}/bin/clang \
            -DCMAKE_CXX_COMPILER=${LLVM_PREFIX}/bin/clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++"

      # ===== Windows 11 =====
      - name: Install toolchain (Windows)
        if: matrix.os == 'Windows'
        run: |
          choco install ninja llvm -y
          pip install aqtinstall

      - name: Install dependencies (Windows)
        if: matrix.os == 'Windows'
        run: |
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          C:\vcpkg\vcpkg install pcre:x64-windows luajit:x64-windows sqlite3:x64-windows openssl:x64-windows zlib:x64-windows

      - name: Install Qt (Windows)
        if: matrix.os == 'Windows'
        run: |
          if (!(Test-Path "C:\Qt\$env:QT_VERSION")) {
            python -m aqt install-qt windows desktop $env:QT_VERSION win64_msvc2022_64 -m qtmultimedia --outputdir C:\Qt
          }
          echo "Qt6_DIR=C:\Qt\$env:QT_VERSION\msvc2022_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
          echo "C:\Qt\$env:QT_VERSION\msvc2022_64\bin" >> $env:GITHUB_PATH

      - name: Configure (Windows)
        if: matrix.os == 'Windows'
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang `
            -DCMAKE_CXX_COMPILER=clang++ `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ===== Build =====
      - name: Build
        run: cmake --build build --config Release --parallel

      # ===== Test =====
      - name: Test (Unix)
        if: matrix.os != 'Windows'
        run: ctest --test-dir build --output-on-failure --build-config Release
        env:
          QT_QPA_PLATFORM: ${{ matrix.os == 'Linux' && 'offscreen' || '' }}

      - name: Test (Windows)
        if: matrix.os == 'Windows'
        run: |
          $env:PATH = "C:\vcpkg\installed\x64-windows\bin;$env:PATH"
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\lua51.dll" "build\lib\" -ErrorAction SilentlyContinue
          ctest --test-dir build --output-on-failure --build-config Release
