name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a draft GitHub release'
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get version from tag or input
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

  build-macos:
    name: Build macOS
    runs-on: [self-hosted, "macos"]
    needs: version
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Homebrew
        run: |
          if [ -x /opt/homebrew/bin/brew ]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          elif [ -x /usr/local/bin/brew ]; then
            eval "$(/usr/local/bin/brew shellenv)"
          fi
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix)/sbin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          brew install cmake ninja llvm pcre luajit sqlite openssl libssh aqtinstall
          brew link --overwrite certifi aqtinstall 2>/dev/null || true

      - name: Cache Qt Static
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ~/.cache/mushkin/Qt-static
          key: qt-static-6.9.3-macos-${{ runner.arch }}-v4

      - name: Build Static Binary
        run: ./scripts/build-macos-static.sh

      - name: Package
        run: |
          mkdir -p package
          cp -R build-static/mushkin.app package/
          cp README.md LICENSE package/ 2>/dev/null || true
          cd package
          zip -r ../mushkin-${{ needs.version.outputs.version }}-macos-${{ runner.arch }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ runner.arch }}
          path: mushkin-${{ needs.version.outputs.version }}-macos-*.zip

  build-linux:
    name: Build Linux
    runs-on: [self-hosted, "linux"]
    needs: version
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libpcre3-dev libsqlite3-dev luajit libluajit-5.1-dev \
            libssl-dev zlib1g-dev libssh-dev libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxcb1-dev libxcb-cursor-dev libxcb-icccm4-dev \
            libxcb-keysyms1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-sync-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-image0-dev libxcb-glx0-dev libxcb-shm0-dev \
            libfontconfig1-dev libfreetype6-dev libx11-dev libx11-xcb-dev \
            libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libatspi2.0-dev libglib2.0-dev \
            libpulse-dev libasound2-dev libpipewire-0.3-dev
          python3 -m pip install --break-system-packages aqtinstall
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Qt Static
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ~/.cache/mushkin/Qt-static
          key: qt-static-6.9.3-linux-x64-v4

      - name: Build Static Binary
        run: ./scripts/build-linux-static.sh

      - name: Package
        run: |
          mkdir -p package/mushkin
          cp build-static/mushkin package/mushkin/
          cp -r build-static/lib package/mushkin/
          cp -r build-static/lua package/mushkin/
          cp README.md LICENSE package/mushkin/ 2>/dev/null || true
          cd package
          tar -czf ../mushkin-${{ needs.version.outputs.version }}-linux-x64.tar.gz mushkin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: mushkin-${{ needs.version.outputs.version }}-linux-x64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: [self-hosted, "windows"]
    needs: version
    timeout-minutes: 45
    steps:
      - name: Enable Long Paths
        run: |
          # Enable Win32 long paths (>260 chars) — required for Qt source builds
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name 'LongPathsEnabled' -Value 1 -Type DWord
          # Also enable git long paths
          git config --system core.longpaths true

      - name: Bootstrap (Windows)
        run: |
          # Install Chocolatey if missing
          if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
            $env:PATH = "C:\ProgramData\chocolatey\bin;$env:PATH"
            echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH
          }
          # Install git if missing
          if (!(Get-Command git -ErrorAction SilentlyContinue)) {
            choco install git -y
            $env:PATH = "C:\Program Files\Git\cmd;$env:PATH"
            echo "C:\Program Files\Git\cmd" >> $env:GITHUB_PATH
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install ninja -y
          pip install aqtinstall
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          C:\vcpkg\vcpkg install pcre:x64-windows luajit:x64-windows sqlite3:x64-windows openssl:x64-windows zlib:x64-windows libssh:x64-windows

      - name: Cache Qt Static
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: C:/Users/runneradmin/AppData/Local/mushkin/Qt-static
          key: qt-static-6.9.3-windows-x64-v7

      - name: Build Static Binary
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          .\scripts\build-windows-static.ps1

      - name: Package
        run: |
          mkdir package\mushkin
          copy build-static\mushkin.exe package\mushkin\

          # Copy Lua C modules (.dll) and Lua scripts (.lua)
          if (Test-Path build-static\lib) {
            xcopy build-static\lib package\mushkin\lib\ /E /I 2>$null
          }
          if (Test-Path build-static\lua) {
            xcopy build-static\lua package\mushkin\lua\ /E /I 2>$null
          }

          # Copy vcpkg DLLs
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            copy "$vcpkgBin\*.dll" package\mushkin\ 2>$null
          }

          copy README.md package\mushkin\ 2>$null
          copy LICENSE package\mushkin\ 2>$null

          cd package
          7z a ..\mushkin-${{ needs.version.outputs.version }}-windows-x64.zip mushkin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: mushkin-${{ needs.version.outputs.version }}-windows-x64.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-macos, build-linux, build-windows]
    # Only create release for tags or when explicitly requested via manual dispatch
    if: startsWith(github.ref, 'refs/tags/') || inputs.create_release == true || inputs.version != ''
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.version.outputs.version) }}
          name: Mushkin ${{ needs.version.outputs.version }}
          body: |
            ## Downloads

            | Platform | File | Contents |
            |----------|------|----------|
            | **Windows x64** | `mushkin-${{ needs.version.outputs.version }}-windows-x64.zip` | Self-contained (exe + DLLs + Lua modules) |
            | **Linux x64** | `mushkin-${{ needs.version.outputs.version }}-linux-x64.tar.gz` | Self-contained (binary + libs + Lua modules) |
            | **macOS** | `mushkin-${{ needs.version.outputs.version }}-macos-*.zip` | Self-contained (.app bundle + Lua modules) |

            All platforms are self-contained — no additional dependencies to install.

            ## Installation

            ### Windows
            1. Extract the ZIP file
            2. Run `mushkin.exe`

            ### Linux
            ```bash
            tar -xzf mushkin-*.tar.gz
            ./mushkin/mushkin
            ```

            ### macOS
            1. Extract the ZIP file
            2. Double-click `mushkin.app`
            3. First run: Right-click → Open (to bypass Gatekeeper)
          files: |
            artifacts/**/*

  publish-wiki-docs:
    name: Publish Lua API Docs
    runs-on: ubuntu-latest
    needs: [version, release]
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate documentation
        run: |
          python scripts/generate-lua-docs.py \
            --version ${{ needs.version.outputs.version }} \
            --update-versions

      - name: Checkout wiki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy generated docs to wiki
        run: |
          # Copy all generated markdown files
          cp docs/wiki/*.md wiki/

          # Ensure Home.md exists with basic content
          if [ ! -f wiki/Home.md ]; then
            cat > wiki/Home.md << 'HOMEEOF'
          # Mushkin Wiki

          Welcome to the Mushkin documentation!

          Mushkin is a modern MUD client built with Qt 6, designed as a cross-platform
          port of MUSHclient with Lua scripting API compatibility.

          ## Documentation

          - [[API Versions]] - Lua API reference documentation by version

          ## Links

          - [GitHub Repository](https://github.com/${{ github.repository }})
          - [Releases](https://github.com/${{ github.repository }}/releases)
          - [Issues](https://github.com/${{ github.repository }}/issues)
          HOMEEOF
          fi

      - name: Commit and push to wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update Lua API docs for v${{ needs.version.outputs.version }}"
            git push
          fi
