<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E0A4C"/>
      <stop offset="100%" style="stop-color:#0D0520"/>
    </linearGradient>

    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5CC6A"/>
      <stop offset="100%" style="stop-color:#A8620A"/>
    </linearGradient>

    <radialGradient id="voidGrad" cx="50%" cy="25%" r="65%">
      <stop offset="0%" style="stop-color:#2B0A5E"/>
      <stop offset="100%" style="stop-color:#060210"/>
    </radialGradient>

    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="104" ry="104" fill="url(#bgGrad)"/>

  <!-- Arch frame — shifted up ~18px -->
  <path d="M 118 422 L 118 212 C 118 132 180 82 256 44 C 332 82 394 132 394 212 L 394 422 Z"
    fill="url(#frameGrad)"/>

  <!-- Inner void -->
  <path d="M 156 422 L 156 220 C 156 150 206 102 256 76 C 306 102 356 150 356 220 L 356 422 Z"
    fill="url(#voidGrad)"/>

  <!-- Stepped base -->
  <rect x="104" y="420" width="304" height="10" rx="3" fill="url(#frameGrad)"/>
  <rect x="128" y="430" width="256" height="7"  rx="3" fill="url(#frameGrad)"/>

  <!-- Stars: scattered, no center clustering -->
  <circle cx="243" cy="112" r="1.4" fill="#FFFFFF" opacity="0.8" filter="url(#starGlow)"/>
  <circle cx="271" cy="130" r="1.0" fill="#C7D2FE" opacity="0.6"/>
  <circle cx="219" cy="150" r="1.6" fill="#E0E7FF" opacity="0.75"/>
  <circle cx="291" cy="158" r="1.2" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="194" cy="196" r="1.8" fill="#FFFFFF" opacity="0.8" filter="url(#starGlow)"/>
  <circle cx="316" cy="180" r="1.4" fill="#C7D2FE" opacity="0.7"/>
  <circle cx="241" cy="222" r="1.0" fill="#E0E7FF" opacity="0.55"/>
  <circle cx="306" cy="241" r="2.0" fill="#FFFFFF" opacity="0.85" filter="url(#starGlow)"/>
  <circle cx="211" cy="271" r="1.2" fill="#C7D2FE" opacity="0.6"/>
  <circle cx="279" cy="258" r="1.6" fill="#E0E7FF" opacity="0.7"/>
  <circle cx="230" cy="308" r="2.4" fill="#FFFFFF" opacity="0.9" filter="url(#starGlow)"/>
  <circle cx="301" cy="293" r="1.0" fill="#A5B4FC" opacity="0.55"/>
  <circle cx="208" cy="345" r="1.4" fill="#E0E7FF" opacity="0.6"/>
  <circle cx="321" cy="328" r="1.8" fill="#FFFFFF" opacity="0.7" filter="url(#starGlow)"/>
  <circle cx="263" cy="371" r="1.0" fill="#C7D2FE" opacity="0.5"/>
  <circle cx="191" cy="390" r="1.2" fill="#A5B4FC" opacity="0.45"/>
  <circle cx="309" cy="382" r="1.4" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="246" cy="407" r="1.0" fill="#A5B4FC" opacity="0.35"/>
</svg>
